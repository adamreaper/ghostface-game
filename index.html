<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#08070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ghostface" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/app-icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/app-icons/favicon-32.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Ghostface Mobile Prototype</title>
  <style>
    :root {
      --bg: #07060b;
      --panel: rgba(13, 12, 20, .72);
      --line: rgba(255,255,255,.12);
      --accent: #d92036;
      --accent2: #8be8ff;
      --text: #f2edf0;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg);
      color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      touch-action: none; overscroll-behavior: none;
    }
    #game { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }
    .hud {
      position: fixed; inset: env(safe-area-inset-top) 0 auto 0; pointer-events: none; padding: 12px 14px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; text-shadow: 0 2px 4px #000;
    }
    .hud-card { min-width: 128px; padding: 10px 12px; background: linear-gradient(180deg, rgba(20,18,29,.74), rgba(6,5,11,.48)); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,.35); backdrop-filter: blur(8px); }
    .brand { font-weight: 900; letter-spacing: .08em; font-size: 12px; color: #fff; }
    .sub { margin-top: 3px; opacity: .78; font-size: 11px; line-height: 1.25; }
    .bar { width: 132px; height: 9px; border-radius: 999px; background: rgba(255,255,255,.12); margin-top: 7px; overflow: hidden; border: 1px solid rgba(255,255,255,.10); }
    .bar > i { display: block; height: 100%; width: 100%; background: linear-gradient(90deg, #d92036, #ff775f); border-radius: 999px; }
    #score { text-align: right; }
    .controls { position: fixed; inset: auto 0 calc(14px + env(safe-area-inset-bottom)) 0; pointer-events: none; }
    .stick-zone { pointer-events: auto; position: absolute; left: 16px; bottom: 0; width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,.08), rgba(255,255,255,.025)); border: 1px solid var(--line); box-shadow: inset 0 0 0 2px rgba(255,255,255,.03); touch-action: none; }
    .stick { position: absolute; left: 50%; top: 50%; width: 62px; height: 62px; margin: -31px 0 0 -31px; border-radius: 50%; background: radial-gradient(circle at 35% 28%, rgba(255,255,255,.38), rgba(180,190,205,.16) 42%, rgba(20,22,29,.75)); border: 1px solid rgba(255,255,255,.18); box-shadow: 0 10px 28px rgba(0,0,0,.45); }
    .buttons { position: absolute; right: 16px; bottom: 2px; width: 184px; height: 154px; pointer-events: auto; touch-action: none; }
    .btn { position: absolute; border: 1px solid rgba(255,255,255,.15); border-radius: 999px; color: white; font-weight: 900; display: grid; place-items: center; user-select: none; text-shadow: 0 2px 4px #000; box-shadow: 0 12px 28px rgba(0,0,0,.35); }
    .btn:active, .btn.active { transform: scale(.96); filter: brightness(1.25); }
    #attackBtn { right: 8px; bottom: 28px; width: 96px; height: 96px; background: radial-gradient(circle at 35% 28%, #ff6b79, #bd1028 56%, #4e0611); font-size: 18px; }
    #dashBtn { left: 8px; bottom: 8px; width: 68px; height: 68px; background: radial-gradient(circle at 35% 28%, #95efff, #147a9a 58%, #073044); font-size: 12px; }
    .hint { position: fixed; left: 50%; top: calc(env(safe-area-inset-top) + 112px); transform: translateX(-50%); width: min(78vw, 360px); padding: 10px 12px; border-radius: 16px; background: rgba(6,5,10,.68); border: 1px solid var(--line); text-align: center; backdrop-filter: blur(8px); box-shadow: 0 14px 42px rgba(0,0,0,.38); pointer-events: none; transition: opacity .28s ease, visibility .28s ease; }
    .hint h1 { margin: 0 0 4px; font-size: 16px; letter-spacing: .04em; }
    .hint p { margin: 3px 0; opacity: .82; font-size: 11px; line-height: 1.25; }
    .hidden { opacity: 0; visibility: hidden; }
    @media (min-width: 900px) { .stick-zone { width: 132px; height: 132px; } .buttons { transform: scale(.92); transform-origin: bottom right; } }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="hud-card">
      <div class="brand">NIGHT STALKER</div>
      <div class="sub" id="status">Find phones. Avoid the hunter.</div>
      <div class="bar"><i id="hpBar"></i></div>
    </div>
    <div class="hud-card" id="score">
      <div class="brand">LEVEL <span id="level">1</span> · <span id="found">0</span>/<span id="total">5</span> PHONES</div>
      <div class="sub">Time <span id="timer">00:00</span> · Combo <span id="combo">0</span> · Enemies <span id="enemyCount">1</span> · Defeated <span id="defeatedCount">0</span></div>
    </div>
  </div>
  <div class="controls">
    <div class="stick-zone" id="stickZone"><div class="stick" id="stick"></div></div>
    <div class="buttons">
      <div class="btn" id="dashBtn">DASH</div>
      <div class="btn" id="attackBtn">SLASH</div>
    </div>
  </div>
  <div class="hint" id="hint">
    <h1>Prototype Ready</h1>
    <p>Mobile: drag left joystick, tap SLASH, tap DASH.</p>
    <p>Desktop: WASD/Arrows, Space attack, Shift dash.</p>
  </div>
<script>
(() => {
  'use strict';
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });
  ctx.imageSmoothingEnabled = false;

  const DPR_CAP = 2;
  let W = 0, H = 0, dpr = 1, scale = 1;
  let last = performance.now();
  let elapsed = 0;
  let shake = 0;
  let pausedHintTimer = 1.8;
  let gameOverTimer = 0;
  let level = 1;
  let levelClearTimer = 0;
  let defeatedEnemies = 0;

  const UI = {
    hp: document.getElementById('hpBar'), found: document.getElementById('found'), total: document.getElementById('total'),
    timer: document.getElementById('timer'), combo: document.getElementById('combo'), status: document.getElementById('status'), hint: document.getElementById('hint'),
    level: document.getElementById('level'), enemyCount: document.getElementById('enemyCount'), defeatedCount: document.getElementById('defeatedCount')
  };

  const keys = new Set();
  const input = { x: 0, y: 0, attack: false, dash: false, attackQueued: false, dashQueued: false };
  const stickZone = document.getElementById('stickZone');
  const stick = document.getElementById('stick');
  const attackBtn = document.getElementById('attackBtn');
  const dashBtn = document.getElementById('dashBtn');
  let stickPointer = null;

  const spriteAssets = {
    ghostIdle: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_idle_192x144.png', 192, 144, 6),
    ghostWalk: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_walk_192x144.png', 192, 144, 6),
    ghostRun: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_run_192x144.png', 192, 144, 6),
    ghostAttack: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_attack_192x144.png', 192, 144, 6),
    ghostHurt: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_hurt_death_192x144.png', 192, 144, 6),
    enemyWoman: loadGridSprite('assets/enemies/enemy-woman-sheet-v1.png', 6, 6),
    phone: loadSprite('assets/detailed-transparent/phone_detailed_32x32.png', 32, 32, 3),
    wall: loadSprite('assets/detailed-transparent/wall_tiles_detailed_64x64.png', 64, 64, 4)
  };

  function loadSprite(src, cellW, cellH, frames) {
    const img = new Image();
    const sheet = { img, cellW, cellH, frames, ready: false };
    img.onload = () => { sheet.ready = true; };
    img.src = src;
    return sheet;
  }

  function loadGridSprite(src, cols, rows) {
    const img = new Image();
    const sheet = { img, cols, rows, ready: false, frames: cols, anchors: [], cells: [] };
    img.onload = () => {
      sheet.ready = true;
      // The enemy sheet is 1024x1024 over a 6x6 grid, so each logical cell is
      // 170.666px. Using fractional source rectangles makes the browser sample
      // between cells, which reads as glitching/bleeding during animation. Use
      // rounded integer cell edges for BOTH measuring and drawing.
      sheet.cells = computeGridCells(img, cols, rows);
      sheet.cellW = sheet.cells[0]?.[0]?.srcW || img.width / cols;
      sheet.cellH = sheet.cells[0]?.[0]?.srcH || img.height / rows;
      sheet.anchors = computeGridAnchors(img, sheet.cells);
    };
    img.src = src;
    return sheet;
  }

  function computeGridCells(img, cols, rows) {
    const xEdges = Array.from({ length: cols + 1 }, (_, i) => Math.round(i * img.width / cols));
    const yEdges = Array.from({ length: rows + 1 }, (_, i) => Math.round(i * img.height / rows));
    const cells = [];
    for (let row = 0; row < rows; row++) {
      const rowCells = [];
      for (let col = 0; col < cols; col++) {
        const srcX = xEdges[col], srcY = yEdges[row];
        rowCells.push({ srcX, srcY, srcW: xEdges[col + 1] - srcX, srcH: yEdges[row + 1] - srcY });
      }
      cells.push(rowCells);
    }
    return cells;
  }

  function computeGridAnchors(img, cells) {
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const c = canvas.getContext('2d', { willReadFrequently: true });
    c.drawImage(img, 0, 0);
    const { data, width } = c.getImageData(0, 0, img.width, img.height);
    const anchors = [];

    for (let row = 0; row < cells.length; row++) {
      const rowAnchors = [];
      for (let col = 0; col < cells[row].length; col++) {
        const { srcX, srcY, srcW, srcH } = cells[row][col];
        let minX = srcW, maxX = 0, minY = srcH, maxY = 0, found = false;
        for (let y = srcY; y < srcY + srcH; y++) {
          for (let x = srcX; x < srcX + srcW; x++) {
            // Ignore almost-transparent edge noise; otherwise invisible fringe
            // pixels become the anchor and make the character snap around.
            if (data[(y * width + x) * 4 + 3] > 16) {
              found = true;
              const rx = x - srcX;
              const ry = y - srcY;
              if (rx < minX) minX = rx;
              if (rx > maxX) maxX = rx;
              if (ry < minY) minY = ry;
              if (ry > maxY) maxY = ry;
            }
          }
        }
        rowAnchors.push(found
          ? { centerX: (minX + maxX + 1) / 2, bottom: maxY + 1 }
          : { centerX: srcW / 2, bottom: srcH });
      }
      anchors.push(rowAnchors);
    }
    return anchors;
  }

  const world = { w: 1600, h: 1000 };
  const camera = { x: 0, y: 0 };
  const PLAYER_SPRITE_SCALE = .72;
  const ENEMY_SPRITE_SCALE = .72;
  const player = { x: 210, y: 220, r: 18, vx: 0, vy: 0, speed: 185, hp: 100, facing: 1, state: 'idle', frame: 0, animT: 0, atk: 0, dash: 0, inv: 0, combo: 0 };
  const enemies = [];
  const phones = [];
  const obstacles = [];
  const particles = [];

  function restartRun() {
    level = 1;
    elapsed = 0;
    player.combo = 0;
    defeatedEnemies = 0;
    initLevel(true);
  }

  function initLevel(fullHeal = false) {
    phones.length = 0; enemies.length = 0; obstacles.length = 0; particles.length = 0;
    const start = { x: 210, y: 220 };
    Object.assign(player, { x: start.x, y: start.y, vx: 0, vy: 0, hp: fullHeal ? 100 : Math.min(100, player.hp + 18), facing: 1, state: 'idle', frame: 0, animT: 0, atk: 0, dash: 0, inv: 1.1 });
    gameOverTimer = 0; levelClearTimer = 0; shake = 0;

    const obs = [[480,420,210,56],[950,510,270,62],[230,610,60,260],[1210,130,70,260],[660,690,88,180],[1330,520,220,55]];
    for (const [x,y,w,h] of obs) obstacles.push({ x,y,w,h });

    const phoneCount = Math.min(5 + level - 1, 18);
    const enemyCount = Math.min(1 + Math.floor((level - 1) / 2), 8);
    for (let i=0;i<phoneCount;i++) {
      const pt = spawnPoint(i + 2, 90);
      phones.push({ x: pt.x, y: pt.y, r: 13, got: false, pulse: (i * .73) % 10 });
    }
    for (let i=0;i<enemyCount;i++) enemies.push(makeEnemy(i));
    UI.total.textContent = phones.length;
    UI.status.textContent = `Level ${level}: collect ${phones.length} phones. Avoid the hunters.`;
    updateUI();
  }

  function makeEnemy(i) {
    const pt = spawnPoint(i + 30, 120);
    const maxHp = 70 + level * 12;
    return { id: i, x: pt.x, y: pt.y, r: 22, speed: 104 + level * 5 + i * 4, maxHp, hp: maxHp, facing: pt.x < player.x ? 1 : -1, state: 'stalk', frame: 0, animT: i * .37, stun: 0, atk: 0, dead: false, respawnTimer: 0, hitFlash: 0 };
  }

  function respawnEnemy(e) {
    const pt = spawnPoint(e.id + 30 + defeatedEnemies * 3, 140);
    const maxHp = 70 + level * 12;
    Object.assign(e, { x: pt.x, y: pt.y, maxHp, hp: maxHp, speed: 104 + level * 5 + e.id * 4, facing: pt.x < player.x ? 1 : -1, state: 'stalk', frame: 0, animT: 0, stun: .35, atk: 0, dead: false, respawnTimer: 0, hitFlash: 0 });
    burst(e.x, e.y, '#8be8ff', 16);
  }

  function spawnPoint(i, margin = 80) {
    const x = margin + ((i * 397 + level * 131) % Math.max(1, world.w - margin * 2));
    const y = margin + ((i * 223 + level * 179) % Math.max(1, world.h - margin * 2));
    if (Math.hypot(x - player.x, y - player.y) < 260) return { x: world.w - x, y: world.h - y };
    return { x, y };
  }

  function advanceLevel() {
    level++;
    player.combo += 5;
    UI.status.textContent = `Level ${level - 1} cleared. More phones. More hunters.`;
    burst(player.x, player.y, '#8be8ff', 34);
    initLevel(false);
  }

  function triggerGameOver() {
    if (gameOverTimer > 0) return;
    gameOverTimer = 3;
    player.state = 'hurt';
    input.x = input.y = 0;
    input.attackQueued = input.dashQueued = false;
    stick.style.transform = 'translate(0px,0px)';
    shake = Math.max(shake, 14);
    burst(player.x, player.y, '#d92036', 26);
    UI.status.textContent = 'Caught. Restarting in 3...';
  }

  function resize() {
    dpr = Math.min(DPR_CAP, window.devicePixelRatio || 1);
    W = Math.floor(innerWidth); H = Math.floor(innerHeight);
    canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
    scale = Math.min(W / 420, H / 760) * 1.05;
  }
  addEventListener('resize', resize, { passive: true }); resize(); restartRun();

  function bindButton(el, prop, queued) {
    const down = e => { e.preventDefault(); input[prop] = true; input[queued] = true; el.classList.add('active'); hideHint(); };
    const up = e => { e.preventDefault(); input[prop] = false; el.classList.remove('active'); };
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up); el.addEventListener('pointercancel', up); el.addEventListener('pointerleave', up);
  }
  bindButton(attackBtn, 'attack', 'attackQueued'); bindButton(dashBtn, 'dash', 'dashQueued');

  stickZone.addEventListener('pointerdown', e => { stickPointer = e.pointerId; stickZone.setPointerCapture(stickPointer); updateStick(e); hideHint(); });
  stickZone.addEventListener('pointermove', e => { if (e.pointerId === stickPointer) updateStick(e); });
  function releaseStick(e) { if (e.pointerId !== stickPointer) return; stickPointer = null; input.x = input.y = 0; stick.style.transform = 'translate(0px,0px)'; }
  stickZone.addEventListener('pointerup', releaseStick); stickZone.addEventListener('pointercancel', releaseStick);
  function updateStick(e) {
    const b = stickZone.getBoundingClientRect(); const cx = b.left + b.width/2, cy = b.top + b.height/2;
    let dx = e.clientX - cx, dy = e.clientY - cy; const max = b.width * .31; const len = Math.hypot(dx,dy) || 1;
    const cl = Math.min(max, len); dx = dx / len * cl; dy = dy / len * cl;
    stick.style.transform = `translate(${dx}px, ${dy}px)`;
    input.x = dx / max; input.y = dy / max;
  }

  addEventListener('keydown', e => { keys.add(e.code); hideHint(); if (e.code === 'Space') input.attackQueued = true; if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') input.dashQueued = true; });
  addEventListener('keyup', e => keys.delete(e.code));
  function keyboardVector() {
    let x = 0, y = 0;
    if (keys.has('KeyA') || keys.has('ArrowLeft')) x--;
    if (keys.has('KeyD') || keys.has('ArrowRight')) x++;
    if (keys.has('KeyW') || keys.has('ArrowUp')) y--;
    if (keys.has('KeyS') || keys.has('ArrowDown')) y++;
    const l = Math.hypot(x,y) || 1;
    return { x: x/l, y: y/l };
  }
  function hideHint() { pausedHintTimer = Math.min(pausedHintTimer, 1.2); }

  function update(dt) {
    elapsed += dt; pausedHintTimer -= dt; UI.hint.classList.toggle('hidden', pausedHintTimer <= 0);
    const kv = keyboardVector();
    let ix = Math.abs(input.x) > .05 || Math.abs(input.y) > .05 ? input.x : kv.x;
    let iy = Math.abs(input.x) > .05 || Math.abs(input.y) > .05 ? input.y : kv.y;
    input.attack = input.attack || keys.has('Space'); input.dash = input.dash || keys.has('ShiftLeft') || keys.has('ShiftRight');

    player.inv = Math.max(0, player.inv - dt); player.atk = Math.max(0, player.atk - dt); player.dash = Math.max(0, player.dash - dt);
    if (input.attackQueued && player.atk <= 0) { player.atk = .56; player.animT = 0; player.frame = 0; player.state = 'attack'; }
    if (input.dashQueued && player.dash <= 0) { player.dash = .72; player.inv = Math.max(player.inv, .28); burst(player.x, player.y, '#8be8ff', 12); }
    input.attackQueued = false; input.dashQueued = false;

    const moving = Math.hypot(ix,iy) > .1;
    if (moving) player.facing = ix >= 0 ? 1 : -1;
    const sp = player.speed * (player.dash > .48 ? 2.55 : 1) * (player.atk > .18 ? .35 : 1);
    moveEntity(player, ix * sp * dt, iy * sp * dt);
    player.state = player.atk > 0 ? 'attack' : moving ? (player.dash > .48 ? 'run' : 'walk') : 'idle';

    for (const ph of phones) if (!ph.got) {
      ph.pulse += dt;
      if (dist(player, ph) < player.r + ph.r + 8) { ph.got = true; player.combo++; burst(ph.x, ph.y, '#dfefff', 18); UI.status.textContent = 'Phone found. Keep moving.'; }
    }

    updateEnemies(dt);
    if (phones.every(p=>p.got) && levelClearTimer <= 0) levelClearTimer = .8;
    if (levelClearTimer > 0) { levelClearTimer -= dt; if (levelClearTimer <= 0) advanceLevel(); }
    updateParticles(dt);
    animate(player, dt); for (const e of enemies) animate(e, dt);
    shake = Math.max(0, shake - dt * 18);
    updateUI();
  }

  function updateEnemies(dt) {
    for (const e of enemies) {
      if (e.dead) { e.respawnTimer = Math.max(0, e.respawnTimer - dt); if (e.respawnTimer <= 0) respawnEnemy(e); continue; }
      e.stun = Math.max(0, e.stun - dt); e.atk = Math.max(0, e.atk - dt); e.hitFlash = Math.max(0, e.hitFlash - dt);
      const dx = player.x - e.x, dy = player.y - e.y, l = Math.hypot(dx,dy) || 1;
      const seen = l < 520 + level * 16;
      const speed = e.speed + phones.filter(p=>p.got).length * 4;
      if (e.stun <= 0) moveEntity(e, dx/l * speed * dt, dy/l * speed * dt);
      e.facing = dx >= 0 ? 1 : -1;
      e.state = e.stun > 0 ? 'hurt' : e.atk > 0 ? 'attack' : seen ? 'run' : 'walk';
      if (l < e.r + player.r + 8 && player.inv <= 0) {
        player.hp = Math.max(0, player.hp - Math.min(22, 11 + level)); player.inv = .85; e.atk = .4; shake = 10; burst(player.x, player.y, '#d92036', 14);
        if (player.hp <= 0) triggerGameOver(); else UI.status.textContent = 'A hunter hit you!';
      }
      if (player.atk > .12 && Math.abs(player.x + player.facing*36 - e.x) < 58 && Math.abs(player.y - e.y) < 50) {
        e.hp = Math.max(0, e.hp - 26); e.stun = .65; e.hitFlash = .18; shake = Math.max(shake, 7); burst(e.x, e.y, '#d92036', 9); player.combo++;
        if (e.hp <= 0) { e.dead = true; e.respawnTimer = Math.max(2.2, 4.2 - level * .12); defeatedEnemies++; burst(e.x, e.y, '#dfefff', 18); UI.status.textContent = `Hunter defeated. Respawning in ${e.respawnTimer.toFixed(1)}s.`; }
      }
    }
  }

  function moveEntity(e, dx, dy) {
    e.x = clamp(e.x + dx, 24, world.w - 24); resolveObstacles(e, 'x');
    e.y = clamp(e.y + dy, 30, world.h - 28); resolveObstacles(e, 'y');
  }
  function resolveObstacles(e, axis) {
    for (const o of obstacles) {
      const nx = clamp(e.x, o.x, o.x+o.w), ny = clamp(e.y, o.y, o.y+o.h);
      const dx = e.x - nx, dy = e.y - ny; const d2 = dx*dx + dy*dy;
      if (d2 < e.r*e.r) {
        const d = Math.sqrt(d2) || 1; const push = e.r - d;
        if (axis === 'x') e.x += (dx/d) * push; else e.y += (dy/d) * push;
      }
    }
  }
  function animate(e, dt) { e.animT += dt * (e.state === 'run' ? 12 : e.state === 'attack' ? 16 : 8); e.frame = Math.floor(e.animT) % 6; }
  function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }
  function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }

  function burst(x,y,color,n) { for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*160,vy:(Math.random()-.5)*160-20,life:.35+Math.random()*.45,color,size:2+Math.random()*4}); }
  function updateParticles(dt) { for (let i=particles.length-1;i>=0;i--) { const p=particles[i]; p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; if(p.life<=0) particles.splice(i,1); } }
  function updateUI() {
    UI.hp.style.width = player.hp + '%'; UI.found.textContent = phones.filter(p=>p.got).length; UI.combo.textContent = player.combo; UI.level.textContent = level; UI.enemyCount.textContent = enemies.filter(e=>!e.dead).length; UI.defeatedCount.textContent = defeatedEnemies;
    const t = Math.floor(elapsed); UI.timer.textContent = String(Math.floor(t/60)).padStart(2,'0') + ':' + String(t%60).padStart(2,'0');
    if (phones.every(p=>p.got) && levelClearTimer > 0) UI.status.textContent = `Level ${level} clear! Next wave incoming...`;
  }

  function updateGameOver(dt) {
    gameOverTimer = Math.max(0, gameOverTimer - dt);
    updateParticles(dt);
    animate(player, dt);
    for (const e of enemies) animate(e, dt);
    shake = Math.max(0, shake - dt * 18);
    const seconds = Math.ceil(gameOverTimer);
    UI.status.textContent = seconds > 0 ? `Caught. Restarting in ${seconds}...` : 'Restarting...';
    updateUI();
    if (gameOverTimer <= 0) restartRun();
  }

  function draw() {
    const now = performance.now(); const dt = Math.min(.033, (now-last)/1000); last = now;
    if (player.hp > 0) update(dt); else updateGameOver(dt);
    render(); requestAnimationFrame(draw);
  }

  function render() {
    const sx = shake ? (Math.random()-.5)*shake : 0, sy = shake ? (Math.random()-.5)*shake : 0;
    camera.x = clamp(player.x - W/(2*scale), 0, world.w - W/scale); camera.y = clamp(player.y - H/(2*scale), 0, world.h - H/scale);
    ctx.save(); ctx.clearRect(0,0,W,H); ctx.fillStyle = '#07060b'; ctx.fillRect(0,0,W,H);
    ctx.translate(sx, sy); ctx.scale(scale, scale); ctx.translate(-camera.x, -camera.y);
    drawWorld(); drawPhones(); for (const e of enemies) if (!e.dead) { drawEntity(e, false); drawEnemyHealthBar(e); } drawEntity(player, true); drawParticles(); ctx.restore(); drawVignette(); if (player.hp <= 0) drawGameOverOverlay();
  }
  function drawWorld() {
    const g = ctx.createLinearGradient(0,0,world.w,world.h); g.addColorStop(0,'#11101a'); g.addColorStop(.55,'#07080d'); g.addColorStop(1,'#181016'); ctx.fillStyle = g; ctx.fillRect(0,0,world.w,world.h);
    ctx.strokeStyle = 'rgba(255,255,255,.035)'; ctx.lineWidth = 1;
    for(let x=0;x<world.w;x+=64){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,world.h); ctx.stroke(); }
    for(let y=0;y<world.h;y+=64){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(world.w,y); ctx.stroke(); }
    for (let i=0;i<obstacles.length;i++) drawWallObstacle(obstacles[i], i);
    for (let i=0;i<70;i++) { const x=(i*283)%world.w, y=(i*151)%world.h; ctx.fillStyle = i%5===0 ? 'rgba(200,20,45,.15)' : 'rgba(255,255,255,.035)'; ctx.fillRect(x,y,2,2); }
  }
  function drawWallObstacle(o, variant) {
    const sheet = spriteAssets.wall;
    ctx.fillStyle = '#171620'; ctx.fillRect(o.x,o.y,o.w,o.h);
    if (!sheet.ready) { ctx.fillStyle = 'rgba(255,255,255,.045)'; ctx.fillRect(o.x,o.y, o.w,5); return; }
    ctx.save(); ctx.beginPath(); ctx.rect(o.x,o.y,o.w,o.h); ctx.clip();
    for (let y=o.y; y<o.y+o.h; y+=sheet.cellH) {
      for (let x=o.x; x<o.x+o.w; x+=sheet.cellW) drawAtlasFrame(sheet, (variant + Math.floor(x/64) + Math.floor(y/64)) % sheet.frames, x, y, sheet.cellW, sheet.cellH);
    }
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,.10)'; ctx.strokeRect(o.x+.5,o.y+.5,o.w-1,o.h-1);
  }
  function drawPhones() {
    const sheet = spriteAssets.phone;
    for (const p of phones) if(!p.got) { const pulse = 1 + Math.sin(p.pulse*5)*.12; const frame = Math.floor(p.pulse*8) % sheet.frames; ctx.save(); ctx.translate(p.x,p.y); ctx.scale(pulse,pulse); if (sheet.ready) drawAtlasFrame(sheet, frame, -16, -16, 32, 32); else { ctx.fillStyle='#0b0d12'; roundRect(-8,-12,16,24,4,true); ctx.fillStyle='#8be8ff'; ctx.fillRect(-5,-8,10,14); } ctx.restore(); }
  }
  function drawEntity(e, isPlayer) {
    ctx.save(); ctx.translate(e.x, e.y); if (e.facing < 0) ctx.scale(-1,1);
    if (isPlayer && e.inv > 0 && Math.floor(elapsed*20)%2===0) ctx.globalAlpha=.45;
    const drawFrame = isPlayer
      ? (e.state === 'attack' ? Math.min(5, Math.floor(clamp(1 - e.atk / .56, 0, .999) * 6)) : e.state === 'idle' ? 0 : e.frame)
      : enemyDrawFrameForState(e);
    drawSpriteLike(e.state, drawFrame, isPlayer ? PLAYER_SPRITE_SCALE : ENEMY_SPRITE_SCALE, isPlayer);
    ctx.restore();
  }
  function drawEnemyHealthBar(e) {
    const pct = clamp(e.hp / e.maxHp, 0, 1);
    const w = 42, h = 6, x = e.x - w/2, y = e.y - 76;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.72)'; roundRect(x-2, y-2, w+4, h+4, 3, true);
    ctx.fillStyle = '#271017'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = pct > .55 ? '#d92036' : pct > .25 ? '#ff9f43' : '#8be8ff'; ctx.fillRect(x, y, w * pct, h);
    ctx.strokeStyle = 'rgba(255,255,255,.28)'; ctx.strokeRect(x+.5, y+.5, w-1, h-1);
    ctx.restore();
  }
  function drawSpriteLike(state, frame, s, isPlayer) {
    const sheet = isPlayer ? playerSheetForState(state) : spriteAssets.enemyWoman;
    if (sheet.ready) {
      if (isPlayer) {
        const idx = Math.floor(frame) % sheet.frames;
        const outW = sheet.cellW * s;
        const outH = sheet.cellH * s;
        drawAtlasFrame(sheet, idx, -outW / 2, 20 * s - outH, outW, outH);
      } else {
        drawEnemyGridFrame(sheet, state, frame, s);
      }
      return;
    }
    // No procedural Ghostface fallback: player visuals must come only from Nate's uploaded, stable-pivot atlas.
    if (isPlayer) { ctx.globalAlpha *= .3; ctx.fillStyle='rgba(0,0,0,.75)'; ctx.beginPath(); ctx.ellipse(0, 12, 26, 9, 0, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
    else drawGuardSprite(state, frame, s);
  }
  function playerSheetForState(state) {
    if (state === 'attack') return spriteAssets.ghostAttack;
    if (state === 'run') return spriteAssets.ghostRun;
    if (state === 'walk') return spriteAssets.ghostWalk;
    if (state === 'hurt') return spriteAssets.ghostHurt;
    return spriteAssets.ghostIdle;
  }
  function enemySheetRowForState(state) {
    if (state === 'attack') return 3;
    if (state === 'run') return 2;
    if (state === 'walk' || state === 'stalk') return 1;
    if (state === 'hurt') return 4;
    return 0;
  }
  function enemySheetFramesForState(state) {
    // The source sheet has several loose/cross-cell frames that still look like
    // teleporting even when anchored correctly. Keep gameplay states on the
    // cleanest cells until the enemy art is re-authored into a normalized atlas.
    if (state === 'idle') return [0, 1, 2, 1];
    if (state === 'walk' || state === 'stalk') return [0, 1, 2, 1];
    if (state === 'run') return [0, 1, 0, 1];
    if (state === 'attack') return [0, 1, 2, 3];
    if (state === 'hurt') return [5];
    return [0];
  }

  function enemyDrawFrameForState(e) {
    if (e.state === 'attack') return Math.min(4, Math.floor(clamp(1 - e.atk / .4, 0, .999) * 5));
    if (e.state === 'hurt') return 0;
    if (e.state === 'idle') return 0;
    return e.frame;
  }
  function drawEnemyGridFrame(sheet, state, frame, s) {
    const row = enemySheetRowForState(state);
    const seq = enemySheetFramesForState(state);
    const col = seq[Math.floor(frame) % seq.length];
    const cell = sheet.cells?.[row]?.[col] || { srcX: col * sheet.cellW, srcY: row * sheet.cellH, srcW: sheet.cellW, srcH: sheet.cellH };
    const outW = cell.srcW * s;
    const outH = cell.srcH * s;
    const anchor = sheet.anchors?.[row]?.[col] || { centerX: cell.srcW / 2, bottom: cell.srcH };
    const baselineY = 16 * s;
    const drawX = -anchor.centerX * s;
    const drawY = baselineY - anchor.bottom * s;
    ctx.drawImage(
      sheet.img,
      cell.srcX,
      cell.srcY,
      cell.srcW,
      cell.srcH,
      Math.round(drawX),
      Math.round(drawY),
      Math.round(outW),
      Math.round(outH)
    );
  }
  function drawAtlasFrame(sheet, frame, dx, dy, dw, dh) {
    ctx.drawImage(sheet.img, frame * sheet.cellW, 0, sheet.cellW, sheet.cellH, Math.round(dx), Math.round(dy), Math.round(dw), Math.round(dh));
  }
  function px(x,y,w,h,color) { ctx.fillStyle=color; ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h)); }
  function drawGuardSprite(state, frame, s) {
    ctx.save(); ctx.scale(s,s);
    const run = state === 'run'; const bob = Math.sin(frame*.9) * (run ? 2.5 : 1.5); const step = Math.sin(frame*Math.PI/3) * (run ? 6 : 3);
    ctx.globalAlpha *= .3; ctx.fillStyle='rgba(0,0,0,.75)'; ctx.beginPath(); ctx.ellipse(0, 13, 22, 8, 0, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha /= .3;
    px(-10+step,3,7,11,'#1b2535'); px(6-step,3,7,11,'#1b2535'); px(-13+step,12,12,5,'#111'); px(4-step,12,13,5,'#111');
    px(-15,-33+bob,30,39,'#29364d'); px(-12,-30+bob,24,8,'#51617d'); px(-8,-47+bob,16,16,'#c89468');
    px(-11,-54+bob,22,10,'#1b1d28'); px(-7,-43+bob,4,3,'#121212'); px(5,-43+bob,4,3,'#121212');
    ctx.strokeStyle='#1b2535'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(11,-27+bob); ctx.lineTo(24,-20+bob); ctx.stroke();
    ctx.fillStyle='rgba(255,242,150,.28)'; ctx.beginPath(); ctx.moveTo(25,-21+bob); ctx.lineTo(92,-44+bob); ctx.lineTo(92,1+bob); ctx.closePath(); ctx.fill();
    px(22,-24+bob,8,6,'#f6e58a');
    ctx.strokeStyle='#1b2535'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(-11,-27+bob); ctx.lineTo(-19,-16+bob); ctx.stroke();
    ctx.restore();
  }
  function drawParticles() { for(const p of particles){ ctx.globalAlpha = Math.max(0,p.life*2); ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size); } ctx.globalAlpha=1; }
  function drawVignette() {
    const rg = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.18,W/2,H/2,Math.max(W,H)*.72); rg.addColorStop(0,'rgba(0,0,0,0)'); rg.addColorStop(.7,'rgba(0,0,0,.25)'); rg.addColorStop(1,'rgba(0,0,0,.82)'); ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(217,32,54,.06)'; ctx.fillRect(0,0,W,H);
  }
  function drawGameOverOverlay() {
    const seconds = Math.max(1, Math.ceil(gameOverTimer));
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.48)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.font = '900 28px Inter, system-ui, sans-serif'; ctx.fillText('CAUGHT', W/2, H/2 - 24);
    ctx.fillStyle = '#ff6b79'; ctx.font = '800 15px Inter, system-ui, sans-serif'; ctx.fillText(`Restarting in ${seconds}...`, W/2, H/2 + 14);
    ctx.restore();
  }
  function roundRect(x,y,w,h,r,fill) {
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x,y,w,h,r);
    else { ctx.rect(x,y,w,h); }
    if(fill) ctx.fill(); else ctx.stroke();
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
