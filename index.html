<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#08070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ghostface" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/app-icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/app-icons/favicon-32.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Ghostface</title>
  <style>
    :root {
      --bg: #07060b;
      --panel: rgba(13, 12, 20, .72);
      --line: rgba(255,255,255,.12);
      --accent: #d92036;
      --accent2: #8be8ff;
      --text: #f2edf0;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg);
      color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      touch-action: none; overscroll-behavior: none;
    }
    #game { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }
    .hud {
      position: fixed; inset: calc(10px + env(safe-area-inset-top)) auto auto 12px; pointer-events: none;
      color: #fff3b7; font: 900 18px/1 "Courier New", ui-monospace, monospace; letter-spacing: .08em;
      text-shadow: 2px 0 #13080d, -2px 0 #13080d, 0 2px #13080d, 0 -2px #13080d, 3px 3px 0 #000;
      image-rendering: pixelated;
    }
    .phone-counter { padding: 0; display: inline-flex; align-items: center; gap: 7px; }
    .phone-icon {
      width: 32px; height: 32px; flex: 0 0 32px; display: inline-block;
      background: url('assets/detailed-transparent/phone_detailed_32x32.png') 0 0 / 96px 32px no-repeat;
      image-rendering: pixelated; transform: translateY(-1px);
    }
    .controls { position: fixed; inset: auto 0 calc(14px + env(safe-area-inset-bottom)) 0; pointer-events: none; image-rendering: pixelated; }
    .stick-zone {
      pointer-events: auto; position: absolute; left: 16px; bottom: 0; width: 150px; height: 150px;
      background: rgba(8, 9, 14, .48); border: 3px solid #2a1a21; box-shadow: inset 0 0 0 3px rgba(255,243,183,.18), 5px 5px 0 rgba(0,0,0,.58);
      touch-action: none; clip-path: polygon(18px 0, calc(100% - 18px) 0, 100% 18px, 100% calc(100% - 18px), calc(100% - 18px) 100%, 18px 100%, 0 calc(100% - 18px), 0 18px);
    }
    .stick {
      position: absolute; left: 50%; top: 50%; width: 62px; height: 62px; margin: -31px 0 0 -31px;
      background: #161821; border: 3px solid #fff3b7; box-shadow: inset -5px -5px 0 #05060a, inset 5px 5px 0 rgba(139,232,255,.32), 4px 4px 0 rgba(0,0,0,.65);
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    }
    .buttons { position: absolute; right: 16px; bottom: 2px; width: 184px; height: 154px; pointer-events: auto; touch-action: none; }
    .btn {
      position: absolute; display: grid; place-items: center; user-select: none;
      color: #fff3b7; font: 900 13px/1 "Courier New", ui-monospace, monospace; letter-spacing: .08em;
      background: #14151d; border: 3px solid #2a1a21; box-shadow: inset 0 0 0 3px rgba(255,243,183,.16), inset -6px -6px 0 rgba(0,0,0,.42), 5px 5px 0 rgba(0,0,0,.65);
      text-shadow: 2px 0 #13080d, -2px 0 #13080d, 0 2px #13080d, 0 -2px #13080d;
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    }
    .btn:active, .btn.active { transform: translate(3px, 3px); filter: brightness(1.25); box-shadow: inset 0 0 0 3px rgba(255,243,183,.22), inset -4px -4px 0 rgba(0,0,0,.38), 2px 2px 0 rgba(0,0,0,.7); }
    #attackBtn { right: 8px; bottom: 28px; width: 96px; height: 96px; border-color: #721827; background: #2a0c15; color: #ffd7dc; font-size: 14px; }
    #dashBtn { left: 8px; bottom: 8px; width: 68px; height: 68px; border-color: #17485a; background: #0d2631; color: #c8f6ff; font-size: 11px; }
    @media (min-width: 900px) { .stick-zone { width: 132px; height: 132px; } .buttons { transform: scale(.92); transform-origin: bottom right; } }
    body.menu-open .hud, body.menu-open .controls { opacity: 0; pointer-events: none; }
    .menu {
      position: fixed; inset: 0; z-index: 5; display: grid; place-items: center; padding: 22px;
      background: radial-gradient(circle at 50% 24%, rgba(217,32,54,.18), rgba(7,6,11,.9) 38%, rgba(0,0,0,.96));
      image-rendering: pixelated;
    }
    .menu.hidden { display: none; }
    .menu-panel {
      width: min(560px, calc(100vw - 28px)); max-height: calc(100vh - 36px); overflow: auto;
      padding: 18px; background: rgba(8,9,14,.92); border: 4px solid #2a1a21;
      box-shadow: inset 0 0 0 3px rgba(255,243,183,.18), 8px 8px 0 rgba(0,0,0,.68);
      clip-path: polygon(14px 0, calc(100% - 14px) 0, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0 calc(100% - 14px), 0 14px);
    }
    .menu-title { margin: 0 0 8px; color: #fff3b7; font: 900 34px/1 "Courier New", ui-monospace, monospace; letter-spacing: .08em; text-shadow: 3px 0 #13080d, -3px 0 #13080d, 0 3px #13080d, 0 -3px #13080d, 5px 5px 0 #000; }
    .menu-sub { margin: 0 0 16px; color: #c8f6ff; font: 900 13px/1.35 "Courier New", ui-monospace, monospace; letter-spacing: .05em; text-shadow: 2px 2px 0 #000; }
    .skin-title { margin: 12px 0 10px; color: #ffd7dc; font: 900 14px/1 "Courier New", ui-monospace, monospace; letter-spacing: .08em; text-shadow: 2px 2px 0 #000; }
    .skin-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
    .skin-option {
      border: 3px solid #2a1a21; background: #14151d; min-height: 116px; padding: 6px; color: #fff3b7;
      font: 900 10px/1.1 "Courier New", ui-monospace, monospace; letter-spacing: .05em; text-transform: uppercase;
      box-shadow: inset 0 0 0 2px rgba(255,243,183,.12), 4px 4px 0 rgba(0,0,0,.55);
      clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
    }
    .skin-option.active { border-color: #fff3b7; color: #fff; background: #251620; }
    .skin-preview {
      display: block; width: 72px; height: 82px; margin: 0 auto 6px;
      image-rendering: pixelated;
    }
    .skin-name { display: block; text-align: center; }
    .start-btn {
      width: 100%; margin-top: 16px; min-height: 54px; border: 3px solid #721827; background: #2a0c15; color: #ffd7dc;
      font: 900 18px/1 "Courier New", ui-monospace, monospace; letter-spacing: .08em; text-shadow: 2px 2px 0 #000;
      box-shadow: inset 0 0 0 3px rgba(255,243,183,.14), inset -6px -6px 0 rgba(0,0,0,.35), 5px 5px 0 rgba(0,0,0,.65);
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    }
    .start-btn:active { transform: translate(3px, 3px); filter: brightness(1.25); }
    .pause-btn {
      position: fixed; top: calc(10px + env(safe-area-inset-top)); right: 12px; z-index: 4; width: 48px; height: 42px;
      border: 3px solid #2a1a21; background: rgba(8,9,14,.82); color: #fff3b7; pointer-events: auto;
      font: 900 18px/1 "Courier New", ui-monospace, monospace; letter-spacing: .04em; text-shadow: 2px 2px 0 #000;
      box-shadow: inset 0 0 0 3px rgba(255,243,183,.16), 4px 4px 0 rgba(0,0,0,.62);
      clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
    }
    .pause-btn:active { transform: translate(2px, 2px); filter: brightness(1.25); }
    .sound-btn { right: 68px; font-size: 16px; }
    body.menu-open #pauseBtn, body.paused .controls { opacity: 0; pointer-events: none; }
    .pause-actions { display: grid; gap: 10px; margin-top: 16px; }
    .pause-actions .start-btn { margin-top: 0; }
    @media (max-width: 520px) { .menu-title { font-size: 27px; } .skin-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } .skin-option { min-height: 104px; } }
  </style>
</head>
<body class="menu-open">
  <canvas id="game"></canvas>
  <div class="hud"><div class="phone-counter" id="status"><span id="phoneCount">0/5</span><span class="phone-icon" aria-label="phone"></span></div></div>
  <button class="pause-btn sound-btn" id="soundBtn" type="button" aria-label="Toggle music">♪</button>
  <button class="pause-btn" id="pauseBtn" type="button" aria-label="Pause">Ⅱ</button>
  <div class="controls">
    <div class="stick-zone" id="stickZone"><div class="stick" id="stick"></div></div>
    <div class="buttons">
      <div class="btn" id="dashBtn">DASH</div>
      <div class="btn" id="attackBtn">SLASH</div>
    </div>
  </div>
  <div class="menu" id="startMenu">
    <div class="menu-panel">
      <h1 class="menu-title">GHOSTFACE</h1>
      <p class="menu-sub">Collect the phones. Survive the hunters. Pick a skin before the chase starts.</p>
      <div class="skin-title">SELECT SKIN</div>
      <div class="skin-grid" id="skinGrid"></div>
      <button class="start-btn" id="startBtn" type="button">START RUN</button>
    </div>
  </div>
  <div class="menu hidden" id="pauseMenu">
    <div class="menu-panel">
      <h1 class="menu-title">PAUSED</h1>
      <p class="menu-sub">Take a breather. Resume the chase or restart back at the main menu.</p>
      <div class="pause-actions">
        <button class="start-btn" id="resumeBtn" type="button">RESUME</button>
        <button class="start-btn" id="restartMenuBtn" type="button">RESTART TO MENU</button>
      </div>
    </div>
  </div>
<script>
(() => {
  'use strict';
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });
  ctx.imageSmoothingEnabled = false;

  const DPR_CAP = 2;
  let W = 0, H = 0, dpr = 1, scale = 1;
  let last = performance.now();
  let elapsed = 0;
  let shake = 0;
  let gameOverTimer = 0;
  let level = 1;
  let levelClearTimer = 0;
  let defeatedEnemies = 0;
  let gameStarted = false;
  let gamePaused = false;
  let gameOverSounded = false;
  let audioUnlocked = false;
  let audioMuted = false;
  let currentMusic = null;
  let currentMusicName = null;
  let musicMode = 'menu';
  let lastMusicCheck = 0;
  let lastMusicSwitch = 0;
  let selectedSkin = 0;

  const SKINS = [
    { name: 'Classic' },
    { name: 'Crimson', robe: [122, 14, 31], shade: [30, 4, 11], accent: [255, 86, 102] },
    { name: 'Phantom', robe: [24, 92, 124], shade: [4, 22, 34], accent: [139, 232, 255] },
    { name: 'Toxic', robe: [54, 125, 37], shade: [10, 32, 9], accent: [176, 255, 89] },
    { name: 'Shadow', robe: [38, 39, 51], shade: [5, 6, 10], accent: [170, 174, 190] }
  ];
  const skinSheetCache = new Map();

  const UI = {
    status: document.getElementById('status'),
    phoneCount: document.getElementById('phoneCount'),
    startMenu: document.getElementById('startMenu'),
    pauseMenu: document.getElementById('pauseMenu'),
    skinGrid: document.getElementById('skinGrid'),
    startBtn: document.getElementById('startBtn'),
    pauseBtn: document.getElementById('pauseBtn'),
    soundBtn: document.getElementById('soundBtn'),
    resumeBtn: document.getElementById('resumeBtn'),
    restartMenuBtn: document.getElementById('restartMenuBtn')
  };

  function makeAudio(src, volume, loop = true) {
    const audio = new Audio(src);
    audio.loop = loop;
    audio.preload = 'auto';
    audio.volume = volume;
    return audio;
  }
  const MUSIC = {
    menu: makeAudio('assets/audio/menu_loop.ogg', .36, true),
    gameplay: makeAudio('assets/audio/gameplay_loop.ogg', .34, true),
    chase: makeAudio('assets/audio/chase_loop.ogg', .42, true),
    gameover: makeAudio('assets/audio/gameover_sting.ogg', .55, false)
  };

  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    Object.values(MUSIC).forEach(audio => audio.load());
    updateMusic();
  }
  function playMusic(name) {
    if (!audioUnlocked || audioMuted) return;
    const next = MUSIC[name];
    if (!next || currentMusic === next) return;
    if (currentMusic) currentMusic.pause();
    currentMusic = next;
    currentMusicName = name;
    currentMusic.play().catch(() => {});
  }
  function pauseMusic() { if (currentMusic) currentMusic.pause(); }
  function stopMusic() { if (currentMusic) { currentMusic.pause(); currentMusic.currentTime = 0; } currentMusic = null; currentMusicName = null; }
  function playSting(name) {
    if (!audioUnlocked || audioMuted) return;
    const sting = MUSIC[name];
    if (!sting) return;
    sting.currentTime = 0;
    sting.play().catch(() => {});
  }
  function nearestEnemyDistance() {
    let nearest = Infinity;
    for (const e of enemies) if (!e.dead) nearest = Math.min(nearest, dist(player, e));
    return nearest;
  }
  function updateMusic() {
    if (!audioUnlocked) return;
    UI.soundBtn.textContent = audioMuted ? '×' : '♪';
    if (audioMuted) { pauseMusic(); return; }
    if (!gameStarted) { playMusic('menu'); return; }
    if (gamePaused) { pauseMusic(); return; }
    if (player.hp <= 0) return;
    const now = performance.now();
    if (now - lastMusicCheck < 250 && currentMusicName) return;
    lastMusicCheck = now;
    const nearest = nearestEnemyDistance();
    let nextMode = musicMode;
    if (musicMode !== 'chase' && nearest < 260) nextMode = 'chase';
    if (musicMode === 'chase' && nearest > 420) nextMode = 'gameplay';
    if (nextMode !== musicMode && now - lastMusicSwitch < 1400) nextMode = musicMode;
    if (nextMode !== musicMode) {
      musicMode = nextMode;
      lastMusicSwitch = now;
    }
    playMusic(musicMode);
  }
  function toggleMute() {
    unlockAudio();
    audioMuted = !audioMuted;
    if (audioMuted) pauseMusic();
    updateMusic();
  }

  const keys = new Set();
  const input = { x: 0, y: 0, attack: false, dash: false, attackQueued: false, dashQueued: false };
  const stickZone = document.getElementById('stickZone');
  const stick = document.getElementById('stick');
  const attackBtn = document.getElementById('attackBtn');
  const dashBtn = document.getElementById('dashBtn');
  let stickPointer = null;

  const spriteAssets = {
    ghostIdle: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_idle_192x144.png', 192, 144, 6),
    ghostWalk: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_walk_192x144.png', 192, 144, 6),
    ghostRun: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_run_192x144.png', 192, 144, 6),
    ghostAttack: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_attack_192x144.png', 192, 144, 6),
    ghostHurt: loadSprite('assets/uploaded-ghostface-v22/ghostface_uploaded_v22_hurt_death_192x144.png', 192, 144, 6),
    enemyWoman: loadGridSprite('assets/enemies/enemy-woman-normalized-v2.png', 6, 6),
    phone: loadSprite('assets/detailed-transparent/phone_detailed_32x32.png', 32, 32, 3),
    wall: loadSprite('assets/detailed-transparent/wall_tiles_detailed_64x64.png', 64, 64, 4)
  };

  function loadSprite(src, cellW, cellH, frames) {
    const img = new Image();
    const sheet = { img, cellW, cellH, frames, ready: false };
    img.onload = () => { sheet.ready = true; renderSkinPreviews(); };
    sheet.src = src;
    img.src = src;
    return sheet;
  }

  function loadGridSprite(src, cols, rows) {
    const img = new Image();
    const sheet = { img, cols, rows, ready: false, frames: cols, anchors: [], cells: [] };
    img.onload = () => {
      sheet.ready = true;
      // The enemy sheet is 1024x1024 over a 6x6 grid, so each logical cell is
      // 170.666px. Using fractional source rectangles makes the browser sample
      // between cells, which reads as glitching/bleeding during animation. Use
      // rounded integer cell edges for BOTH measuring and drawing.
      sheet.cells = computeGridCells(img, cols, rows);
      sheet.cellW = sheet.cells[0]?.[0]?.srcW || img.width / cols;
      sheet.cellH = sheet.cells[0]?.[0]?.srcH || img.height / rows;
      sheet.anchors = computeGridAnchors(img, sheet.cells);
    };
    img.src = src;
    return sheet;
  }

  function computeGridCells(img, cols, rows) {
    const xEdges = Array.from({ length: cols + 1 }, (_, i) => Math.round(i * img.width / cols));
    const yEdges = Array.from({ length: rows + 1 }, (_, i) => Math.round(i * img.height / rows));
    const cells = [];
    for (let row = 0; row < rows; row++) {
      const rowCells = [];
      for (let col = 0; col < cols; col++) {
        const srcX = xEdges[col], srcY = yEdges[row];
        rowCells.push({ srcX, srcY, srcW: xEdges[col + 1] - srcX, srcH: yEdges[row + 1] - srcY });
      }
      cells.push(rowCells);
    }
    return cells;
  }

  function computeGridAnchors(img, cells) {
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const c = canvas.getContext('2d', { willReadFrequently: true });
    c.drawImage(img, 0, 0);
    const { data, width } = c.getImageData(0, 0, img.width, img.height);
    const anchors = [];

    for (let row = 0; row < cells.length; row++) {
      const rowAnchors = [];
      for (let col = 0; col < cells[row].length; col++) {
        const { srcX, srcY, srcW, srcH } = cells[row][col];
        let minX = srcW, maxX = 0, minY = srcH, maxY = 0, found = false;
        for (let y = srcY; y < srcY + srcH; y++) {
          for (let x = srcX; x < srcX + srcW; x++) {
            // Ignore almost-transparent edge noise; otherwise invisible fringe
            // pixels become the anchor and make the character snap around.
            if (data[(y * width + x) * 4 + 3] > 16) {
              found = true;
              const rx = x - srcX;
              const ry = y - srcY;
              if (rx < minX) minX = rx;
              if (rx > maxX) maxX = rx;
              if (ry < minY) minY = ry;
              if (ry > maxY) maxY = ry;
            }
          }
        }
        rowAnchors.push(found
          ? {
              centerX: (minX + maxX + 1) / 2,
              bottom: maxY + 1,
              cropX: minX,
              cropY: minY,
              cropW: maxX - minX + 1,
              cropH: maxY - minY + 1
            }
          : { centerX: srcW / 2, bottom: srcH, cropX: 0, cropY: 0, cropW: srcW, cropH: srcH });
      }
      anchors.push(rowAnchors);
    }
    return anchors;
  }

  const world = { w: 1600, h: 1000 };
  const MAPS = [
    { key: 'backrooms', name: 'BACKROOMS', bg: '#b9a45d', floor: ['#b9a45d', '#c6b56d', '#a9914f', '#d4c277'], wall: '#7f6a36', trim: '#e7d889', accent: '#f2e27d', dust: '#fff1a8' },
    { key: 'field', name: 'GRASSY FIELD', bg: '#1d612b', floor: ['#1f6b31', '#287a39', '#185425', '#359247'], wall: '#5b4324', trim: '#86c85a', accent: '#f7e26b', dust: '#d8ffd0' },
    { key: 'hell', name: 'HELL', bg: '#1b0710', floor: ['#240814', '#3a0d16', '#56151a', '#11060b'], wall: '#2c0b10', trim: '#ff6b1a', accent: '#ff2d18', dust: '#ffb14a' }
  ];
  function currentMap() { return MAPS[(level - 1) % MAPS.length]; }
  const camera = { x: 0, y: 0 };
  const PLAYER_SPRITE_SCALE = .72;
  const ENEMY_SPRITE_SCALE = .72;
  const player = { x: 210, y: 220, r: 18, vx: 0, vy: 0, speed: 185, hp: 100, facing: 1, state: 'idle', frame: 0, animT: 0, atk: 0, dash: 0, inv: 0, combo: 0 };
  const enemies = [];
  const phones = [];
  const obstacles = [];
  const particles = [];

  function buildSkinMenu() {
    UI.skinGrid.innerHTML = SKINS.map((skin, i) => `
      <button class="skin-option${i === selectedSkin ? ' active' : ''}" data-skin="${i}" type="button">
        <canvas class="skin-preview" width="72" height="82" data-skin-preview="${i}"></canvas>
        <span class="skin-name">${skin.name}</span>
      </button>
    `).join('');
    for (const option of UI.skinGrid.querySelectorAll('.skin-option')) {
      option.addEventListener('pointerdown', e => {
        e.preventDefault();
        selectedSkin = Number(option.dataset.skin) || 0;
        updateSkinMenu();
      });
    }
  }
  function updateSkinMenu() {
    for (const option of UI.skinGrid.querySelectorAll('.skin-option')) option.classList.toggle('active', Number(option.dataset.skin) === selectedSkin);
  }
  function renderSkinPreviews() {
    const idle = spriteAssets.ghostIdle;
    if (!idle?.ready || !UI.skinGrid) return;
    for (const canvas of UI.skinGrid.querySelectorAll('[data-skin-preview]')) {
      const skinIndex = Number(canvas.dataset.skinPreview) || 0;
      const previewCtx = canvas.getContext('2d');
      previewCtx.imageSmoothingEnabled = false;
      previewCtx.clearRect(0, 0, canvas.width, canvas.height);
      const sheet = sheetForSkin(idle, skinIndex);
      if (!sheet.ready) continue;
      previewCtx.drawImage(sheet.img, 0, 0, idle.cellW, idle.cellH, -18, -4, 108, 81);
    }
  }
  function sheetForSkin(base, skinIndex = selectedSkin) {
    if (!base?.ready || skinIndex === 0) return base;
    const key = `${base.src}|${skinIndex}`;
    if (!skinSheetCache.has(key)) skinSheetCache.set(key, recolorSheet(base, SKINS[skinIndex]));
    return skinSheetCache.get(key);
  }
  function recolorSheet(base, skin) {
    const canvas = document.createElement('canvas');
    canvas.width = base.img.width; canvas.height = base.img.height;
    const c = canvas.getContext('2d', { willReadFrequently: true });
    c.imageSmoothingEnabled = false;
    c.drawImage(base.img, 0, 0);
    const imgData = c.getImageData(0, 0, canvas.width, canvas.height);
    const d = imgData.data;

      ctx.fillStyle = '#4a321d'; ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.fillStyle = '#6e4b29'; for (let x=o.x; x<o.x+o.w; x+=18) ctx.fillRect(x,o.y+4,10,o.h-8);
      ctx.fillStyle = '#234b27'; ctx.fillRect(o.x,o.y-6,o.w,12); ctx.fillRect(o.x,o.y+o.h-6,o.w,12);
    } else if (map.key === 'hell') {
      ctx.fillStyle = '#17060a'; ctx.fillRect(o.x,o.y,o.w,o.h);
      for (let x=o.x; x<o.x+o.w; x+=32) { ctx.fillStyle = pick(['#2b0c11','#3b1013','#110408'], x, o.y, variant); ctx.fillRect(x,o.y,32,o.h); }
      ctx.fillStyle = 'rgba(255,71,22,.82)'; ctx.fillRect(o.x+4,o.y+4,o.w-8,4); ctx.fillRect(o.x+8,o.y+o.h-8,o.w-16,4);
    } else {
      ctx.fillStyle = '#8a7136'; ctx.fillRect(o.x,o.y,o.w,o.h);
      for (let y=o.y; y<o.y+o.h; y+=24) { ctx.fillStyle = y%48===0 ? '#a88b47' : '#70572b'; ctx.fillRect(o.x,y,o.w,12); }
      ctx.fillStyle = '#f1df81'; ctx.fillRect(o.x+5,o.y+5,o.w-10,5);
    }
    ctx.strokeStyle = map.trim; ctx.lineWidth = 2; ctx.strokeRect(o.x+.5,o.y+.5,o.w-1,o.h-1);
    ctx.strokeStyle = 'rgba(0,0,0,.45)'; ctx.strokeRect(o.x+4.5,o.y+4.5,o.w-9,o.h-9);
  }
  function drawMapAtmosphere(map) {
    for (let i=0;i<80;i++) {
      const x=(i*283 + level*37)%world.w, y=(i*151 + level*59)%world.h;
      ctx.fillStyle = i%7===0 ? map.accent : 'rgba(255,255,255,.05)';
      ctx.globalAlpha = map.key === 'hell' ? .28 : map.key === 'field' ? .18 : .22;
      ctx.fillRect(x,y,map.key === 'hell' ? 3 : 2,map.key === 'field' ? 4 : 2);
      ctx.globalAlpha = 1;
    }
  }
  function drawPhones() {
    const sheet = spriteAssets.phone;
    for (const p of phones) if(!p.got) { const pulse = 1 + Math.sin(p.pulse*5)*.12; const frame = Math.floor(p.pulse*8) % sheet.frames; ctx.save(); ctx.translate(p.x,p.y); ctx.scale(pulse,pulse); if (sheet.ready) drawAtlasFrame(sheet, frame, -16, -16, 32, 32); else { ctx.fillStyle='#0b0d12'; roundRect(-8,-12,16,24,4,true); ctx.fillStyle='#8be8ff'; ctx.fillRect(-5,-8,10,14); } ctx.restore(); }
  }
  function drawEntity(e, isPlayer) {
    ctx.save(); ctx.translate(e.x, e.y); if (e.facing < 0) ctx.scale(-1,1);
    if (isPlayer && e.inv > 0 && Math.floor(elapsed*20)%2===0) ctx.globalAlpha=.45;
    const drawFrame = isPlayer
      ? (e.state === 'attack' ? Math.min(5, Math.floor(clamp(1 - e.atk / .56, 0, .999) * 6)) : e.state === 'idle' ? 0 : e.frame)
      : enemyDrawFrameForState(e);
    drawSpriteLike(e.state, drawFrame, isPlayer ? PLAYER_SPRITE_SCALE : ENEMY_SPRITE_SCALE, isPlayer);
    ctx.restore();
  }
  function drawEnemyHealthBar(e) {
    const pct = clamp(e.hp / e.maxHp, 0, 1);
    const w = 42, h = 6, x = e.x - w/2, y = e.y - 76;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.72)'; roundRect(x-2, y-2, w+4, h+4, 3, true);
    ctx.fillStyle = '#271017'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = pct > .55 ? '#d92036' : pct > .25 ? '#ff9f43' : '#8be8ff'; ctx.fillRect(x, y, w * pct, h);
    ctx.strokeStyle = 'rgba(255,255,255,.28)'; ctx.strokeRect(x+.5, y+.5, w-1, h-1);
    ctx.restore();
  }
  function drawPlayerHealthBar() {
    const pct = clamp(player.hp / 100, 0, 1);
    const w = 56, h = 7, x = player.x - w / 2, y = player.y - 88;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.74)'; roundRect(x - 3, y - 3, w + 6, h + 6, 4, true);
    ctx.fillStyle = '#241018'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = pct > .55 ? '#38e06f' : pct > .25 ? '#ffb14a' : '#d92036'; ctx.fillRect(x, y, w * pct, h);
    ctx.strokeStyle = 'rgba(255,255,255,.38)'; ctx.strokeRect(x + .5, y + .5, w - 1, h - 1);
    ctx.restore();
  }
  function drawSpriteLike(state, frame, s, isPlayer) {
    const sheet = isPlayer ? sheetForSkin(playerSheetForState(state)) : spriteAssets.enemyWoman;
    if (sheet.ready) {
      if (isPlayer) {
        const idx = Math.floor(frame) % sheet.frames;
        const outW = sheet.cellW * s;
        const outH = sheet.cellH * s;
        drawAtlasFrame(sheet, idx, -outW / 2, 20 * s - outH, outW, outH);
      } else {
        drawEnemyGridFrame(sheet, state, frame, s);
      }
      return;
    }
    // No procedural Ghostface fallback: player visuals must come only from Nate's uploaded, stable-pivot atlas.
    if (isPlayer) { ctx.globalAlpha *= .3; ctx.fillStyle='rgba(0,0,0,.75)'; ctx.beginPath(); ctx.ellipse(0, 12, 26, 9, 0, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
    else drawGuardSprite(state, frame, s);
  }
  function playerSheetForState(state) {
    if (state === 'attack') return spriteAssets.ghostAttack;
    if (state === 'run') return spriteAssets.ghostRun;
    if (state === 'walk') return spriteAssets.ghostWalk;
    if (state === 'hurt') return spriteAssets.ghostHurt;
    return spriteAssets.ghostIdle;
  }
  function enemySheetRowForState(state) {
    if (state === 'attack') return 3;
    if (state === 'run') return 2;
    if (state === 'walk' || state === 'stalk') return 1;
    if (state === 'hurt') return 4;
    return 0;
  }
  function enemySheetFramesForState(state) {
    // With crop-based drawing in place, use a fuller loop again so the enemy
    // visibly walks instead of sliding. Avoid the last cell, which is the most
    // collapsed/off-pose frame on the sheet.
    if (state === 'idle') return [0, 1, 2, 1];
    if (state === 'walk' || state === 'stalk') return [0, 1, 2, 3, 4, 3, 2, 1];
    if (state === 'run') return [0, 1, 2, 3, 4, 3, 2, 1];
    if (state === 'attack') return [0, 1, 2, 3, 4];
    if (state === 'hurt') return [5];
    return [0];
  }

  function enemyDrawFrameForState(e) {
    if (e.state === 'attack') return Math.min(4, Math.floor(clamp(1 - e.atk / .4, 0, .999) * 5));
    if (e.state === 'hurt') return 0;
    if (e.state === 'idle') return 0;
    return e.frame;
  }
  function drawEnemyGridFrame(sheet, state, frame, s) {
    const row = enemySheetRowForState(state);
    const seq = enemySheetFramesForState(state);
    const col = seq[Math.floor(frame) % seq.length];
    const cell = sheet.cells?.[row]?.[col] || { srcX: col * sheet.cellW, srcY: row * sheet.cellH, srcW: sheet.cellW, srcH: sheet.cellH };
    const anchor = sheet.anchors?.[row]?.[col] || { centerX: cell.srcW / 2, bottom: cell.srcH, cropX: 0, cropY: 0, cropW: cell.srcW, cropH: cell.srcH };
    // Draw only the measured opaque crop. Drawing the whole cell preserves
    // leftover sheet artifacts/neighbor fragments even when the pivot is stable.
    const cropX = anchor.cropX ?? 0;
    const cropY = anchor.cropY ?? 0;
    const cropW = anchor.cropW ?? cell.srcW;
    const cropH = anchor.cropH ?? cell.srcH;
    const baselineY = 16 * s;
    const drawX = -(anchor.centerX - cropX) * s;
    const drawY = baselineY - (anchor.bottom - cropY) * s;
    ctx.drawImage(
      sheet.img,
      cell.srcX + cropX,
      cell.srcY + cropY,
      cropW,
      cropH,
      Math.round(drawX),
      Math.round(drawY),
      Math.round(cropW * s),
      Math.round(cropH * s)
    );
  }
  function drawAtlasFrame(sheet, frame, dx, dy, dw, dh) {
    ctx.drawImage(sheet.img, frame * sheet.cellW, 0, sheet.cellW, sheet.cellH, Math.round(dx), Math.round(dy), Math.round(dw), Math.round(dh));
  }
  function px(x,y,w,h,color) { ctx.fillStyle=color; ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h)); }
  function drawGuardSprite(state, frame, s) {
    ctx.save(); ctx.scale(s,s);
    const run = state === 'run'; const bob = Math.sin(frame*.9) * (run ? 2.5 : 1.5); const step = Math.sin(frame*Math.PI/3) * (run ? 6 : 3);
    ctx.globalAlpha *= .3; ctx.fillStyle='rgba(0,0,0,.75)'; ctx.beginPath(); ctx.ellipse(0, 13, 22, 8, 0, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha /= .3;
    px(-10+step,3,7,11,'#1b2535'); px(6-step,3,7,11,'#1b2535'); px(-13+step,12,12,5,'#111'); px(4-step,12,13,5,'#111');
    px(-15,-33+bob,30,39,'#29364d'); px(-12,-30+bob,24,8,'#51617d'); px(-8,-47+bob,16,16,'#c89468');
    px(-11,-54+bob,22,10,'#1b1d28'); px(-7,-43+bob,4,3,'#121212'); px(5,-43+bob,4,3,'#121212');
    ctx.strokeStyle='#1b2535'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(11,-27+bob); ctx.lineTo(24,-20+bob); ctx.stroke();
    ctx.fillStyle='rgba(255,242,150,.28)'; ctx.beginPath(); ctx.moveTo(25,-21+bob); ctx.lineTo(92,-44+bob); ctx.lineTo(92,1+bob); ctx.closePath(); ctx.fill();
    px(22,-24+bob,8,6,'#f6e58a');
    ctx.strokeStyle='#1b2535'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(-11,-27+bob); ctx.lineTo(-19,-16+bob); ctx.stroke();
    ctx.restore();
  }
  function drawParticles() { for(const p of particles){ ctx.globalAlpha = Math.max(0,p.life*2); ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size); } ctx.globalAlpha=1; }
  function drawVignette() {
    const rg = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.18,W/2,H/2,Math.max(W,H)*.72); rg.addColorStop(0,'rgba(0,0,0,0)'); rg.addColorStop(.7,'rgba(0,0,0,.25)'); rg.addColorStop(1,'rgba(0,0,0,.82)'); ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(217,32,54,.06)'; ctx.fillRect(0,0,W,H);
  }
  function drawGameOverOverlay() {
    const seconds = Math.max(1, Math.ceil(gameOverTimer));
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.48)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.font = '900 28px Inter, system-ui, sans-serif'; ctx.fillText('CAUGHT', W/2, H/2 - 24);
    ctx.fillStyle = '#ff6b79'; ctx.font = '800 15px Inter, system-ui, sans-serif'; ctx.fillText(`Restarting in ${seconds}...`, W/2, H/2 + 14);
    ctx.restore();
  }
  function roundRect(x,y,w,h,r,fill) {
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x,y,w,h,r);
    else { ctx.rect(x,y,w,h); }
    if(fill) ctx.fill(); else ctx.stroke();
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
